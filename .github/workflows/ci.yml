# Static sanity over the codebase — no Salesforce org required.
name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    static-sanity:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run prettier:verify
            - run: npm run lint
            - run: npm run test:unit
